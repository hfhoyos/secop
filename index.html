<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Motor RAG SECOP II - hfhoyos</title>
    <style>
        :root { --bg: #050505; --accent: #0ED5B0; --purple: #8E44AD; --gold: #D97757; }
        body { font-family: sans-serif; background: var(--bg); color: #e0e0e0; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 1200px; }
        header { text-align: center; margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .search-zone { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 20px; display: grid; grid-template-columns: 1fr 1fr 150px; gap: 10px; margin-bottom: 20px; border: 1px solid #333; }
        input { background: #111; border: 1px solid #333; color: white; padding: 10px; border-radius: 8px; outline: none; }
        .rag-grid { display: grid; grid-template-columns: 1fr 380px; gap: 20px; }
        .console { background: #111; border-radius: 24px; padding: 25px; border: 1px solid #232938; min-height: 450px; display: flex; flex-direction: column; }
        #ai-output { flex-grow: 1; font-size: 14px; line-height: 1.6; color: #d1d1d6; white-space: pre-wrap; overflow-y: auto; }
        .evidence-box { background: #080808; border-radius: 24px; padding: 20px; border: 1px solid var(--purple); max-height: 500px; overflow-y: auto; }
        .ev-card { background: #1a1a1a; padding: 10px; border-radius: 8px; margin-bottom: 8px; border-left: 3px solid var(--purple); font-size: 11px; }
        .chat-bar { background: #21263B; padding: 10px; border-radius: 12px; display: flex; gap: 10px; margin-top: 15px; border: 1px solid var(--purple); }
        .chat-bar input { flex-grow: 1; background: transparent; border: none; }
        button { background: var(--purple); color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Motor RAG SECOP II - hfhoyos</h1>
        <div style="font-size: 10px; color: var(--accent);">AUDITORÍA ANALÍTICA EXPERTA</div>
    </header>

    <div class="search-zone">
        <input type="text" id="kw1" placeholder="Entidad (Ej: SENA)">
        <input type="text" id="kw2" placeholder="Objeto (Ej: AI)">
        <button onclick="ragCore.loadData()">CARGAR DATOS</button>
    </div>

    <div class="rag-grid">
        <div class="console">
            <div id="ai-output"><strong>[Analista Senior]:</strong> Esperando sincronización de evidencia de SECOP II...</div>
            <div class="chat-bar">
                <input type="text" id="user-ask" placeholder="Pregunta sobre los datos cargados...">
                <button onclick="ragCore.askAI()" style="background:var(--accent); color:black;">PREGUNTAR</button>
            </div>
        </div>
        <div class="evidence-box">
            <h3 style="margin:0; font-size:12px; color:var(--purple);">EVIDENCIA RECOLECTADA</h3>
            <div id="ev-list" style="margin-top:15px; font-size:11px; text-align:center; color:#555;">Búfer vacío.</div>
        </div>
    </div>
</div>

<script>
    let evidenceMemory = [];
    const AI_KEY = "AIzaSyAJarbr-303YfF2TDptgOI8NLZbdwmByHQ";

    const ragCore = {
        async loadData() {
            const ent = document.getElementById('kw1').value.toUpperCase();
            const obj = document.getElementById('kw2').value.toUpperCase();
            const list = document.getElementById('ev-list');
            list.innerHTML = "<em>Recuperando de la nube...</em>";

            try {
                // Alternativa de proxy más estable
                const url = `https://www.datos.gov.co/resource/jbjy-vk9h.json?$limit=100&$order=fecha_de_publicacion_del_proceso DESC`;
                const proxyUrl = "https://api.allorigins.win/get?url=" + encodeURIComponent(url);
                
                const response = await fetch(proxyUrl);
                const json = await response.json();
                const rawData = JSON.parse(json.contents);

                evidenceMemory = rawData.filter(d => 
                    (d.nombre_entidad || "").toUpperCase().includes(ent) && 
                    (d.objeto_del_contrato || "").toUpperCase().includes(obj)
                ).slice(0, 7);

                if (evidenceMemory.length > 0) {
                    list.innerHTML = evidenceMemory.map(d => `
                        <div class="ev-card">
                            <strong>${d.nombre_entidad}</strong><br>
                            $${Number(d.valor_del_contrato || 0).toLocaleString()}<br>
                            ${(d.objeto_del_contrato || "").substring(0,50)}...
                        </div>
                    `).join('');
                    document.getElementById('ai-output').innerHTML = "<strong>[System]:</strong> Evidencia cargada con éxito. Procede con tu consulta de auditoría.";
                } else {
                    list.innerHTML = "No se encontraron coincidencias para los filtros aplicados.";
                }
            } catch (e) {
                list.innerHTML = "<span style='color:red'>Error de Red:</span> No se pudo saltar el bloqueo CORS. Intente buscar un término general.";
            }
        },

        async askAI() {
            const q = document.getElementById('user-ask').value;
            const out = document.getElementById('ai-output');
            if (evidenceMemory.length === 0) return alert("Carga datos primero.");

            out.innerHTML = "<em>Analizando evidencia con Gemini 1.5 Flash...</em>";

            const context = evidenceMemory.map(d => `ENTIDAD: ${d.nombre_entidad} | OBJETO: ${d.objeto_del_contrato} | VALOR: ${d.valor_del_contrato}`).join('\n\n');

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${AI_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: `Eres un Ingeniero Senior. Analiza la EVIDENCIA y responde la PREGUNTA.\n\nEVIDENCIA:\n${context}\n\nPREGUNTA: ${q}` }] }] })
                });
                const data = await res.json();
                out.innerText = data.candidates[0].content.parts[0].text;
            } catch (e) {
                out.innerText = "Error en la Torre de Inteligencia.";
            }
        }
    };
</script>
</body>
</html>
